              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

    return !!(window.parent && window.parent !== window);
  }

      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

  }

        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

    frameCount++;

      gameReadySent = true;
      sendEvent('game_ready', {

      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {

            gameReadySent = true;

              detected_at: Date.now()

.btn{

.btn:active{transform:translateY(1px)}
.btn-secondary{background:#edf4fd;color:var(--blue);box-shadow:none}

.progress-wrap{height:10px;background:var(--mint-dark);border-radius:20px;overflow:hidden;margin:14px 0 6px}

.stamps-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:16px 0}
.stamp{
  aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:22px;background:#f5faff;border:2px dashed #c6d9f0;color:#9bb4d1;transition:.3s;
}
.stamp.filled{
  background:var(--blue);border:2px solid var(--blue);color:#fff;
  box-shadow:0 6px 14px rgba(74,144,226,.35);transform:scale(1.05);
}

.free-banner{
  background:linear-gradient(135deg,#ffe08c,#ffb347);color:#7a4100;
  padding:14px;border-radius:16px;text-align:center;font-weight:900;
  letter-spacing:.3px;margin:12px 0;box-shadow:0 8px 20px rgba(255,179,71,.25);
  animation:pulse 1.8s infinite;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}

.history-item{
  display:flex;align-items:center;justify-content:space-between;
  background:#f8fbff;padding:12px 14px;border-radius:14px;
}
.history-item + .history-item{margin-top:8px}
.history-item .meta{font-size:12px;color:var(--muted);margin-top:2px}
.badge{width:34px;height:34px;border-radius:10px;background:#e8f1fe;display:flex;align-items:center;justify-content:center;font-size:18px}

.user-bar{display:flex;justify-content:space-between;align-items:center;gap:10px}

.modal{position:fixed;inset:0;background:rgba(13,27,48,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal.show{display:flex}
.modal-card{width:100%;max-width:340px}

#toast{
  position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
  background:#132b46;color:#fff;padding:12px 18px;border-radius:12px;font-weight:700;
  box-shadow:0 10px 30px rgba(0,0,0,.22);opacity:0;pointer-events:none;transition:.3s;z-index:100;
  max-width:90vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.error{background:#ff5d5d}
#toast.success{background:#00b894}

video{width:100%;border-radius:16px;background:#000;aspect-ratio:1/1;object-fit:cover}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dim{color:var(--muted);font-size:12px;text-align:center;margin-top:8px}
hr.sep{border:0;height:1px;background:#eef3f9;margin:14px 0}
</style>

<script>
const SUPABASE_URL = 'https://pwmthagkiyemdubfqdzh.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_q9DAl-CDxrvx9tZl-qtZkA_Jnclhvs3';
const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentCustomer = null;
let currentUser = null;
let stream = null;
let scanInterval = null;
let scanMode = 'add';

const $ = id => document.getElementById(id);
const toast = $('toast');

function showToast(msg, type='success'){
  toast.textContent = msg;
  toast.className = '';
  toast.classList.add(type==='error'?'error':'success');
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 2600);
}

function switchTab(tab){
  const isCustomer = tab==='customer';
  $('customerView').style.display = isCustomer ? 'block' : 'none';
  $('staffView').style.display = isCustomer ? 'none' : 'block';
  $('tab-customer').classList.toggle('active', isCustomer);
  $('tab-staff').classList.toggle('active', !isCustomer);
}

$('tab-customer').onclick = ()=>switchTab('customer');
$('tab-staff').onclick = ()=>switchTab('staff');

function renderStamps(loads){
  const grid = $('stampsGrid');
  grid.innerHTML = '';
  for(let i=0;i<15;i++){
    const d = document.createElement('div');
    d.className = 'stamp' + (i < loads ? ' filled' : '');
    d.innerHTML = i < loads ? '✓' : '🧺';
    grid.appendChild(d);
  }
}

async function checkCustomer(phoneOverride){
  const phone = (phoneOverride || $('phoneInput').value || '').trim().replace(/\s+/g,'');
  if(!phone){ showToast('Enter phone number','error'); return; }
  
  const { data, error } = await supa.from('customers').select('*').eq('phone', phone).maybeSingle();
  if(error){ showToast(error.message,'error'); return; }
  if(!data){ showToast('Suki not found. Ask staff to register.','error'); $('customerCard').style.display='none'; return; }
  
  currentCustomer = data;
  $('customerCard').style.display = 'block';
  $('custName').textContent = data.name || 'Suki';
  $('custLoads').innerHTML = `${data.loads || 0}<span style="font-size:16px;color:#9bb4d1">/15</span>`;
  $('progressFill').style.width = Math.min(100, ((data.loads||0)/15)*100) + '%';
  $('freeBanner').style.display = (data.loads||0) >= 15 ? 'block' : 'none';
  renderStamps(data.loads||0);
  
  // history
  const { data:hist } = await supa.from('load_history')
    .select('*')
    .eq('customer_id', data.id)
    .order('created_at',{ascending:false})
    .limit(10);
  
  const list = $('historyList');
  list.innerHTML = '';
  if(!hist || hist.length===0){
    $('historyEmpty').style.display='block';
  } else {
    $('historyEmpty').style.display='none';
    hist.forEach(h=>{
      const item = document.createElement('div');
      item.className='history-item';
      const date = new Date(h.created_at).toLocaleString();
      item.innerHTML = `
        <div>
          <div style="font-weight:800">${h.type==='add' ? '+1 Load' : 'REDEEMED Free Wash'}</div>
          <div class="meta">${date}${h.note ? ' • '+h.note : ''}</div>
        </div>
        <div class="badge">${h.type==='add'?'🧺':'🎁'}</div>
      `;
      list.appendChild(item);
    });
  }
}
$('checkBtn').onclick = ()=>checkCustomer();

$('showQrBtn').onclick = ()=>{
  if(!currentCustomer) return;
  $('qrName').textContent = currentCustomer.name;
  $('qrCodeText').textContent = currentCustomer.qr_code;
  $('qrcode').innerHTML = '';
  new QRCode($('qrcode'), { text: currentCustomer.qr_code, width:220, height:220, correctLevel: QRCode.CorrectLevel.H });
  $('qrModal').classList.add('show');
};
$('closeQrBtn').onclick = ()=>$('qrModal').classList.remove('show');
$('qrModal').onclick = e => { if(e.target.id==='qrModal') $('qrModal').classList.remove('show') };

// STAFF AUTH
async function refreshSession(){
  const { data } = await supa.auth.getSession();
  if(data.session?.user){
    currentUser = data.session.user;
    showStaffDash();
  }
}
function showStaffDash(){
  $('loginCard').style.display='none';
  $('staffDash').style.display='block';
  $('staffEmailShow').textContent = currentUser.email;
}
$('loginBtn').onclick = async ()=>{
  const email = $('staffEmail').value.trim();
  const password = $('staffPass').value;
  if(!email || !password){ showToast('Enter email and password','error'); return; }
  $('loginBtn').disabled = true;
  $('loginBtn').textContent = 'Logging in...';
  const { data, error } = await supa.auth.signInWithPassword({ email, password });
  $('loginBtn').disabled = false;
  $('loginBtn').textContent = 'Login';
  if(error){ showToast(error.message,'error'); return; }
  currentUser = data.user;
  showStaffDash();
  showToast('Welcome, '+currentUser.email);
};
$('logoutBtn').onclick = async ()=>{
  await supa.auth.signOut();
  currentUser = null;
  $('staffDash').style.display='none';
  $('loginCard').style.display='block';
  showToast('Logged out');
};

// ADD / REDEEM
async function addLoad(customer, note){
  if(!currentUser){ showToast('Staff login required','error'); return; }
  if((customer.loads||0) >= 15){ showToast('Already FREE READY','error'); return; }
  const newLoads = (customer.loads||0) + 1;
  
  const { error: insErr } = await supa.from('load_history').insert({
    customer_id: customer.id,
    type: 'add',
    loads: 1,
    note: note || null,
    staff_id: currentUser.id
  });
  if(insErr){ showToast(insErr.message,'error'); return; }
  
  const { error: updErr } = await supa.from('customers').update({ loads: newLoads }).eq('id', customer.id);
  if(updErr){ showToast(updErr.message,'error'); return; }
  
  showToast(`+1 Load for ${customer.name} (${newLoads}/15)`);
  if(currentCustomer && currentCustomer.id === customer.id){
    checkCustomer(currentCustomer.phone);
  }
}

async function redeemLoad(customer){
  if(!currentUser){ showToast('Staff login required','error'); return; }
  if((customer.loads||0) < 15){ showToast('Not enough loads (need 15)','error'); return; }
  
  const { error: insErr } = await supa.from('load_history').insert({
    customer_id: customer.id,
    type: 'redeem',
    loads: 15,
    note: 'Redeemed free wash',
    staff_id: currentUser.id
  });
  if(insErr){ showToast(insErr.message,'error'); return; }
  
  const { error: updErr } = await supa.from('customers').update({ loads: 0 }).eq('id', customer.id);
  if(updErr){ showToast(updErr.message,'error'); return; }
  
  showToast(`🎉 Redeemed! Free wash for ${customer.name}`);
  if(currentCustomer && currentCustomer.id === customer.id){
    checkCustomer(currentCustomer.phone);
  }
}

$('manualAddBtn').onclick = async ()=>{
  const phone = $('manualPhone').value.trim().replace(/\s+/g,'');
  const note = $('manualNote').value.trim();
  if(!phone){ showToast('Enter phone','error'); return; }
  const { data, error } = await supa.from('customers').select('*').eq('phone', phone).maybeSingle();
  if(error || !data){ showToast('Customer not found','error'); return; }
  await addLoad(data, note || 'Manual add');
  $('manualPhone').value=''; $('manualNote').value='';
};

$('registerBtn').onclick = async ()=>{
  const name = $('newName').value.trim();
  const phone = $('newPhone').value.trim().replace(/\s+/g,'');
  if(!name || !phone){ showToast('Enter name and phone','error'); return; }
  const code = 'LM-' + Math.random().toString(36).substring(2,8).toUpperCase();
  const { error } = await supa.from('customers').insert({ name, phone, qr_code: code, loads: 0 });
  if(error){ showToast(error.message,'error'); return; }
  showToast(`Registered ${name} • ${code}`);
  $('newName').value=''; $('newPhone').value='';
};

// SCANNER
async function startScanner(mode){
  if(!currentUser){ showToast('Login first','error'); return; }
  scanMode = mode;
  $('scannerWrap').style.display='block';
  $('scanModeLabel').textContent = mode==='add' ? 'Point camera at customer QR to ADD 1 load' : 'Point camera at customer QR to REDEEM';
  
  try{
    // Use Html5Qrcode for maximum mobile compatibility (iOS + Android)
    if(!window.html5Qr){ window.html5Qr = new Html5Qrcode("scannerVideo"); }
    const cameras = await Html5Qrcode.getCameras();
    const camId = cameras.find(c=>/back|rear|environment/i.test(c.label))?.id || cameras[0]?.id;
    await html5Qr.start(
      camId,
      { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
      (decodedText)=>{
        stopScanner();
        handleScannedCode(decodedText);
      },
      (err)=>{}
    );
  }catch(e){
    showToast('Camera error: '+e.message,'error');
    stopScanner();
  }
}
function stopScanner(){
  if(window.html5Qr && html5Qr.isScanning){
    html5Qr.stop().catch(()=>{});
  }
  $('scannerWrap').style.display='none';
}
$('scanAddBtn').onclick = ()=>startScanner('add');
$('scanRedeemBtn').onclick = ()=>startScanner('redeem');
$('stopScanBtn').onclick = stopScanner;

async function handleScannedCode(code){
  showToast('Scanned: '+code);
  const { data, error } = await supa.from('customers').select('*').eq('qr_code', code).maybeSingle();
  if(error || !data){ showToast('QR not found','error'); return; }
  if(scanMode==='add'){
    await addLoad(data, 'QR Scan');
  }else{
    await redeemLoad(data);
  }
}

// Init
refreshSession();
renderStamps(0);
</script>
